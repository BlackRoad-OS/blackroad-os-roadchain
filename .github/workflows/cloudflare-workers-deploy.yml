name: ☁️ Deploy Cloudflare Worker

on:
  push:
    branches: [main, master]
    paths:
      - 'workers/**'
      - 'wrangler.toml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-worker:
    name: Deploy API Worker to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy workers/api.js --name blackroad-roadchain-api --compatibility-date 2026-01-01 --compatibility-flag nodejs_compat

      - name: ✅ Verify Worker Health
        run: |
          echo "⏳ Waiting for Worker deployment to propagate..."
          sleep 15
          HEALTH_URL="https://roadchain.blackroad.io/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Worker is healthy! Status: $STATUS"
          else
            echo "⚠️  Worker health check returned status: $STATUS (may still be propagating)"
          fi

      - name: 🚨 Notify on Failure
        if: failure()
        run: |
          echo "❌ Cloudflare Worker deployment failed!"
          echo "Check the Cloudflare dashboard for details."
          exit 1
