name: 🔍 BlackRoad CodeQL Security Analysis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run at 4 AM UTC every Monday (10 PM CST Sunday)
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Override auto-detection and specify languages manually
        # Supported: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift'
        # Note: TypeScript is analyzed under the 'javascript' language
        language: [ 'javascript', 'python' ]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # github/codeql-action/autobuild@v3

      - name: 🔒 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

      - name: 📊 Upload Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: |
            **/results/*.sarif
            **/results/*.csv
          retention-days: 30

      - name: 📝 Create Issue on Failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 CodeQL Security Analysis Failed',
              body: `## CodeQL Analysis Failed

              **Language:** ${{ matrix.language }}
              **Workflow:** ${context.workflow}
              **Run:** ${context.runId}
              **URL:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

              Please review the security findings and address any critical vulnerabilities.

              ---
              © 2025-2026 BlackRoad OS, Inc.
              `,
              labels: ['security', 'codeql', 'automated']
            });
            console.log('Created issue:', issue.data.number);
